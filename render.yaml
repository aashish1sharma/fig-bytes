services:
  - type: web
    name: fig-bytes
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node scripts/server.mjs
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22

  - type: cron
    name: fig-bytes-refresh
    runtime: node
    schedule: "30 1 * * *"
    buildCommand: npm install
    startCommand: node scripts/fetch-news.mjs
